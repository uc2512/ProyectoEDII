<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HerboTrack</title>
    <link rel="icon" href="{{ url_for('static', filename='logo.png') }}" type="image/png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/estilos.css') }}">
</head>
<body>
    <nav class="navbar navbar-dark bg-success px-4">
        <span class="navbar-brand fw-bold">HerboTrack</span>
        {% if current_user.is_authenticated %}
            <a href="/logout" class="btn btn-outline-light btn-sm">Cerrar sesión</a>
        {% endif %}
    </nav>
    <div class="container mt-4">
        {% block contenido %}{% endblock %}
    </div>

    <div class="position-fixed bottom-0 end-0 p-3" style="z-index: 9999">
        <div id="toast" class="toast align-items-center text-white border-0" role="alert">
            <div class="d-flex">
                <div class="toast-body" id="toastMensaje"></div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
    function mostrarToast(mensaje, exito=true) {
        const toast = document.getElementById('toast');
        toast.classList.remove('bg-success', 'bg-danger');
        toast.classList.add(exito ? 'bg-success' : 'bg-danger');
        document.getElementById('toastMensaje').textContent = mensaje;
        new bootstrap.Toast(toast, {delay: 3000}).show();
    }
    </script>
</body>
</html>
