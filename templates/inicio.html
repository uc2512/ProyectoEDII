{% extends "base.html" %}
{% block contenido %}

<h4>Registrar Paciente</h4>
<form id="formRegistro" class="row g-3 mb-5">
    <div class="col-md-6">
        <input type="text" id="carnet" class="form-control" placeholder="Carnet de identidad" required>
    </div>
    <div class="col-md-6">
        <input type="text" id="nombre" class="form-control" placeholder="Nombre completo" required>
    </div>
    <div class="col-md-6">
        <input type="number" id="edad" class="form-control" placeholder="Edad" required>
    </div>
    <div class="col-md-6">
        <input type="text" id="contacto" class="form-control" placeholder="Contacto" required>
    </div>
    <div class="col-12">
        <button type="submit" class="btn btn-success">Registrar</button>
    </div>
</form>

<h4>Buscar Paciente</h4>
<div class="row g-3">
    <div class="col-md-6">
        <input type="text" id="buscarCarnet" class="form-control" placeholder="Carnet de identidad">
    </div>
    <div class="col-md-2">
        <button onclick="buscar()" class="btn btn-primary w-100">Buscar</button>
    </div>
</div>
<div id="resultado" class="mt-4"></div>

<script src="{{ url_for('static', filename='js/registro.js') }}"></script>
{% endblock %}
